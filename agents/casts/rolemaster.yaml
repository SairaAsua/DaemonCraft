# DaemonCraft Rolemaster Mode Cast
# Solo Holodeck Director — Pamplinas manipulates the world directly.
# No supporting cast. He spawns what the story needs, when the timeline demands it.

name: rolemaster
description: |
  A single agent — Pamplinas, the Holodeck Director — who creates and guides
  adventures by manipulating the Minecraft world directly. He works alone:
  no helper bots, no NPC entourage. The world itself is his cast.
  
  Timelines are measured in Minecraft days (1 day = 20 real minutes).
  Stories breathe to the rhythm of sunrises and sunsets.

mode: rolemaster
soul_file: SOUL-rolemaster.md

agents:
  - name: Pamplinas
    template: rolemaster/pamplinas
    port: 3002
    model: gemma4:e4b-it-q8_0
    provider: custom
    base_url: http://10.10.20.1:11434/v1
    always_chat: true
    extra_toolsets:
      - vision
    gamemode: creative
    immortal: true
    max_chat_chars: 480
    chat_format: say_lines

# Narrative timing configuration
timeline:
  unit: minecraft_days
  dawn: 0
  noon: 6000
  dusk: 12000
  midnight: 18000
