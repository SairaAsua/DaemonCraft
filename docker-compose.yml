version: "3.8"

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: daemoncraft-minecraft
    restart: unless-stopped
    network_mode: host
    environment:
      # --- Core Server Settings ---
      EULA: "true"
      TYPE: "FORGE"
      VERSION: "1.20.1"
      SERVER_NAME: "DaemonCraft-Dev"
      MOTD: "\\u00A72DaemonCraft\\u00A7r Development Server"

      # --- Memory ---
      MEMORY: "12G"
      INIT_MEMORY: "8G"
      MAX_MEMORY: "12G"

      # --- Gameplay / Dev Settings ---
      ONLINE_MODE: "false"
      DIFFICULTY: "peaceful"
      CREATE_CONSOLE_IN_PIPE: "true"
      ALLOW_FLIGHT: "true"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
      MAX_PLAYERS: "20"
      VIEW_DISTANCE: "10"
      SIMULATION_DISTANCE: "10"
      GAME_MODE: "survival"

      # --- Modpack (CurseForge Auto-Install) ---
      # Requires a CurseForge API key. See docs/server-setup.md for details.
      # Uncomment the lines below and set CF_API_KEY in .env to enable:
      # MODPACK_PLATFORM: "CURSEFORGE"
      # CF_PAGE_URL: "https://www.curseforge.com/minecraft/modpacks/phi-craft/files/7654543"
      # CF_API_KEY: ${CF_API_KEY:-}

      # --- Manual Fallback ---
      # 1. Download the Phi-Craft modpack .zip manually.
      # 2. Place it in ./server/modpacks/phi-craft.zip
      # 3. Uncomment the lines below:
      # MODPACK: "/modpacks/phi-craft.zip"
      # MODPACK_PLATFORM: ""

      # --- Logging ---
      TZ: "UTC"
    volumes:
      - ./server/data:/data
      # Mount for manual modpack fallback zip (read-only)
      - ./server/modpacks:/modpacks:ro
    tty: true
    stdin_open: true
    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # LAN Discovery Broadcaster — makes dedicated server visible in LAN list
  # ---------------------------------------------------------------------------
  lan-broadcast:
    image: python:3-alpine
    container_name: daemoncraft-lan-broadcast
    restart: unless-stopped
    network_mode: host
    environment:
      BROADCAST_MOTD: "DaemonCraft Dev Server"
      BROADCAST_PORT: "25565"
    volumes:
      - ./lan-broadcast/broadcast.py:/broadcast.py:ro
    command: python /broadcast.py

  # ---------------------------------------------------------------------------
  # Geyser Standalone — Bedrock → Java bridge
  # ---------------------------------------------------------------------------
  geyser:
    image: eclipse-temurin:17-jre-alpine
    container_name: daemoncraft-geyser
    restart: unless-stopped
    depends_on:
      minecraft:
        condition: service_healthy
    network_mode: host
    environment:
      TZ: "UTC"
    volumes:
      - ./server/geyser:/geyser
    working_dir: /geyser
    command: >
      sh -c "
        if [ ! -f Geyser.jar ]; then
          echo 'Downloading Geyser Standalone...';
          wget -q -O Geyser.jar https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/standalone;
        fi &&
        java -jar Geyser.jar
      "

  # ---------------------------------------------------------------------------
  # Daemon Bot — Mineflayer AI Agent
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: ./agents/bot
      dockerfile: Dockerfile
    container_name: daemoncraft-bot
    restart: unless-stopped
    depends_on:
      minecraft:
        condition: service_healthy
    environment:
      MC_HOST: 172.17.0.1
      MC_PORT: 25565
      MC_USERNAME: Steve
      MC_AUTH: offline
      API_PORT: 3000
      API_HOST: 0.0.0.0
      AUTO_RECONNECT: "true"
      LOG_LEVEL: info
      DAEMON_NAME: DaemonBot
      DAEMON_ROLE: explorer
      AGENT_BRIDGE_URL: http://bridge:5000
    ports:
      - "3000:3000"
    volumes:
      - ./agents/bot:/app
      - /app/node_modules
    networks:
      - daemoncraft

  # ---------------------------------------------------------------------------
  # Agent Bridge — Python Control Plane
  # ---------------------------------------------------------------------------
  bridge:
    build:
      context: ./agent-bridge
      dockerfile: Dockerfile
    container_name: daemoncraft-bridge
    restart: unless-stopped
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
      BOT_REGISTRY: "DaemonBot=http://bot:3000"
      TRIGGER_TIMEOUT: "30"
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    volumes:
      - ./agent-bridge:/app
    networks:
      - daemoncraft
    depends_on:
      - bot

  # ---------------------------------------------------------------------------
  # Redis — Message Bus for Future Swarm
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: daemoncraft-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - daemoncraft
    ports:
      - "6379:6379"

# ---------------------------------------------------------------------------
# Networks and Volumes
# ---------------------------------------------------------------------------
networks:
  daemoncraft:
    driver: bridge

volumes:
  redis-data:
